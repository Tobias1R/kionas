syntax = "proto3";

package worker_service;

import "filter_predicate.proto";

// Worker registration
message RegisterWorkerRequest {
  string worker_id = 1;
  string host = 2;
  int32 port = 3;
}

message RegisterWorkerResponse {
  string status = 1;
  string uuid = 2;
}

// Heartbeat
message HeartbeatRequest {
  string worker_id = 1;
}

message HeartbeatResponse {
  string status = 1;
}

// Task-based execution
message TaskRequest {
  string session_id = 1;
  repeated StagePartitionExecution tasks = 2;
}

message TaskResponse {
  string status = 1;
  string error = 2;
  string result_location = 3; // Arrow Flight endpoint or file path
}

enum ExecutionModeHint {
  EXECUTION_MODE_HINT_UNSPECIFIED = 0;
  EXECUTION_MODE_HINT_LOCAL_ONLY = 1;
  EXECUTION_MODE_HINT_DISTRIBUTED = 2;
}

message OutputDestination {
  uint32 downstream_stage_id = 1;
  repeated string worker_addresses = 2;
  string partitioning = 3;
  uint32 downstream_partition_count = 4;
}

message StagePartitionExecution {
  string task_id = 1;
  string operation = 2; // e.g., "scan", "filter", "aggregate", "write"
  string input = 3; // input path or ticket
  string output = 4; // output path or ticket
  map<string, string> params = 5; // operation-specific parameters
  FilterPredicate filter_predicate = 6;
  string query_id = 7;
  uint32 stage_id = 8;
  uint32 partition_id = 9;
  bytes execution_plan = 10;
  repeated OutputDestination output_destinations = 11;
  ExecutionModeHint execution_mode_hint = 12;
  uint32 partition_count = 13;
  repeated uint32 upstream_stage_ids = 14;
  map<uint32, uint32> upstream_partition_counts = 15;
  string partition_spec = 16;
  string query_run_id = 17;
  bytes raw_payload = 18;
}

// Arrow Flight integration
message FlightInfoRequest {
  string session_id = 1;
  string task_id = 2;
}

message FlightInfoResponse {
  string endpoint = 1;
  string schema = 2;
  string ticket = 3;
}

service WorkerService {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ExecuteTask(TaskRequest) returns (TaskResponse);
  rpc GetFlightInfo(FlightInfoRequest) returns (FlightInfoResponse);
  // Transactional helpers for 2PC-lite
  rpc Prepare(PrepareRequest) returns (PrepareResponse);
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc Abort(AbortRequest) returns (AbortResponse);
}

message PrepareRequest {
  string tx_id = 1;
  string session_id = 2;
  string staging_prefix = 3;
  repeated StagePartitionExecution tasks = 4; // tasks to stage
}

message PrepareResponse {
  bool success = 1;
  string message = 2;
}

message CommitRequest {
  string tx_id = 1;
  string staging_prefix = 2;
}

message CommitResponse {
  bool success = 1;
  string message = 2;
}

message AbortRequest {
  string tx_id = 1;
  string staging_prefix = 2;
}

message AbortResponse {
  bool success = 1;
  string message = 2;
}