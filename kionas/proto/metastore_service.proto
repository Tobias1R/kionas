syntax = "proto3";

package metastore_service;
/*
metastoreService

Describes the protocol between client and the data-metastore service
*/

// What: Metadata control-plane service for catalog, schema, table, transaction, and RBAC operations.
//
// Inputs:
// - Requests are routed through `Execute` oneof actions and dedicated statistics endpoints.
//
// Output:
// - Returns operation-specific response payloads.
service MetastoreService {
  // What: Execute one metastore action request.
  //
  // Inputs:
  // - `MetastoreRequest` carrying one action in its oneof payload.
  //
  // Output:
  // - `MetastoreResponse` carrying one result in its oneof payload.
  rpc Execute(MetastoreRequest) returns (MetastoreResponse);

  // What: Persist table-level statistics payload for a table UUID.
  //
  // Inputs:
  // - `UpdateTableStatisticsRequest` with `table_uuid` and statistics payload.
  //
  // Output:
  // - Success/failure response.
  rpc UpdateTableStatistics(UpdateTableStatisticsRequest) returns (UpdateTableStatisticsResponse);

  // What: Read table-level statistics payload for a table UUID.
  //
  // Inputs:
  // - `GetTableStatisticsRequest` with `table_uuid`.
  //
  // Output:
  // - Statistics response when available.
  rpc GetTableStatistics(GetTableStatisticsRequest) returns (GetTableStatisticsResponse);
}

message MetastoreRequest {
  oneof action {
    CreateTableRequest create_table = 1;
    DropTableRequest drop_table = 2;
    GetTableRequest get_table = 3;
    // Schema/Catalogue related requests
    CreateSchemaRequest create_schema = 4;
    DropSchemaRequest drop_schema = 5;
    GetSchemaRequest get_schema = 6;
    // Database related requests
    CreateDatabaseRequest create_database = 7;
    GetDatabaseRequest get_database = 8;
    // Transaction-related requests
    CreateTransactionRequest create_transaction = 20;
    UpdateTransactionStateRequest update_transaction_state = 21;
    GetTransactionRequest get_transaction = 22;
    // RBAC related requests
    CreateUserRequest create_user = 30;
    DeleteUserRequest delete_user = 31;
    CreateGroupRequest create_group = 32;
    DeleteGroupRequest delete_group = 33;
    CreateRoleRequest create_role = 34;
    DropRoleRequest drop_role = 35;
    GrantRoleRequest grant_role = 36;
    // Additional requests can be added here
  }
}

message MetastoreResponse {
  oneof result {
    CreateTableResponse create_table_response = 1;
    DropTableResponse drop_table_response = 2;
    GetTableResponse get_table_response = 3;
    // Schema/Catalogue related responses
    CreateSchemaResponse create_schema_response = 4;
    DropSchemaResponse drop_schema_response = 5;
    GetSchemaResponse get_schema_response = 6;
    // Database related responses
    CreateDatabaseResponse create_database_response = 7;
    GetDatabaseResponse get_database_response = 8;
    // Transaction-related responses
    CreateTransactionResponse create_transaction_response = 20;
    UpdateTransactionStateResponse update_transaction_state_response = 21;
    GetTransactionResponse get_transaction_response = 22;
    // RBAC related responses
    CreateUserResponse create_user_response = 30;
    DeleteUserResponse delete_user_response = 31;
    CreateGroupResponse create_group_response = 32;
    DeleteGroupResponse delete_group_response = 33;
    CreateRoleResponse create_role_response = 34;
    DropRoleResponse drop_role_response = 35;
    GrantRoleResponse grant_role_response = 36;
    // Additional responses can be added here
  }
}

// RBAC messages
message CreateUserRequest {
  string username = 1;
}

message CreateUserResponse {
  bool success = 1;
  string message = 2;
}

message DeleteUserRequest {
  string username = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message CreateGroupRequest {
  string group_name = 1;
}

message CreateGroupResponse {
  bool success = 1;
  string message = 2;
}

message DeleteGroupRequest {
  string group_name = 1;
}

message DeleteGroupResponse {
  bool success = 1;
  string message = 2;
}

message CreateRoleRequest {
  string role_name = 1;
  string description = 2;
}

message CreateRoleResponse {
  bool success = 1;
  string message = 2;
}

message DropRoleRequest {
  string role_name = 1;
}

message DropRoleResponse {
  bool success = 1;
  string message = 2;
}

message GrantRoleRequest {
  string role_name = 1;
  string principal_type = 2; // user | group
  string principal_name = 3;
  string granted_by = 4;
}

message GrantRoleResponse {
  bool success = 1;
  string message = 2;
}

// Table related messages
message CreateTableRequest {
  string database_name = 1;
  string schema_name = 2;
  string table_name = 3;
  string engine = 4; // e.g., "parquet", "csv"
  repeated ColumnSchema columns = 5;
  string location = 6;
  string ast_payload_json = 7;
}

message DropTableRequest {
  string schema_name = 1;
  string table_name = 2;
}

message GetTableRequest {
  string database_name = 1;
  string schema_name = 2;
  string table_name = 3;
  string location = 4; // Optional: location of the table data
}

message CreateTableResponse {
  bool success = 1;
  string message = 2;
}

message DropTableResponse {
  bool success = 1;
  string message = 2;
}

message GetTableResponse {
  bool success = 1;
  string message = 2;
  TableMetadata metadata = 3;
}

// Schema/Catalogue related messages
message CreateSchemaRequest {
  string schema_name = 1;
  string database_name = 2;
  string ast_payload_json = 3;
}

message DropSchemaRequest {
  string schema_name = 1;
}

message GetSchemaRequest {
  string schema_name = 1;
  string database_name = 2;
}

message CreateSchemaResponse {
  bool success = 1;
  string message = 2;
}

message DropSchemaResponse {
  bool success = 1;
  string message = 2;
}

message GetSchemaResponse {
  bool success = 1;
  string message = 2;
  SchemaMetadata metadata = 3;
}

// Database related messages
message CreateDatabaseRequest {
  string database_name = 1;
}

message GetDatabaseRequest {
  string database_name = 1;
}

message CreateDatabaseResponse {
  bool success = 1;
  string message = 2;
}

message GetDatabaseResponse {
  bool success = 1;
  string message = 2;
  DatabaseMetadata metadata = 3;
}

// Common messages
message ColumnSchema {
  string name = 1;
  string data_type = 2; // e.g., "string", "int", "float"
  bool nullable = 3;
}

message TableMetadata {
  string uuid = 1;
  string schema_name = 2;
  string table_name = 3;
  string table_type = 4; // e.g., "delta", "external"
  string location = 5;
  string container = 6;
  repeated ColumnSchema columns = 7;
  string database_name = 8;
}

message PartitionMetadata {
  string uuid = 1;
  string table_uuid = 2;
  string location = 3;
  string owner = 4;
  string values_json = 5;
  string created_at = 6;
}

message SchemaMetadata {
  string uuid = 1;
  string schema_name = 2;
  string location = 3;
  string container = 4;
  string database_name = 5;
}

// Transaction messages
enum TransactionState {
  PREPARING = 0;
  PREPARED = 1;
  COMMITTING = 2;
  COMMITTED = 3;
  ABORTED = 4;
}

message Participant {
  string id = 1;
  string target = 2;
  string staging_prefix = 3;
}

message Transaction {
  string tx_id = 1;
  TransactionState state = 2;
  repeated Participant participants = 3;
  string created_at = 4; // ISO8601
  string updated_at = 5; // ISO8601
}

message CreateTransactionRequest {
  string tx_id = 1;
  repeated Participant participants = 2;
}

message CreateTransactionResponse {
  bool success = 1;
  string message = 2;
  Transaction transaction = 3;
}

message UpdateTransactionStateRequest {
  string tx_id = 1;
  TransactionState state = 2;
}

message UpdateTransactionStateResponse {
  bool success = 1;
  string message = 2;
  Transaction transaction = 3;
}

message GetTransactionRequest {
  string tx_id = 1;
}

message GetTransactionResponse {
  bool success = 1;
  string message = 2;
  Transaction transaction = 3;
}

message CatalogMetadata {
  string uuid = 1;
  string name = 2;
  string description = 3;
  string owner = 4;
  string location = 5;
  string created_at = 6;
}

message DatabaseMetadata {
  string uuid = 1;
  string database_name = 2;
  string location = 3;
  string container = 4;
}

// Statistics messages
message TableStatistics {
  string uuid = 1;
  string table_uuid = 2;
  int64 row_count = 3;
  int64 data_size_bytes = 4;
  string last_updated = 5;
}

message UpdateTableStatisticsRequest {
  string table_uuid = 1;
  TableStatistics statistics = 2;
}

message UpdateTableStatisticsResponse {
  bool success = 1;
  string message = 2;
}

message GetTableStatisticsRequest {
  string table_uuid = 1;
}

message GetTableStatisticsResponse {
  bool success = 1;
  string message = 2;
  TableStatistics statistics = 3;
}

