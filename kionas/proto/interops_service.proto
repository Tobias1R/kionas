syntax = "proto3";

package interops_service;

// What: Control-plane RPC service for worker registration, heartbeats, and task progress updates.
service InteropsService {
    // Register new warehouse worker
    rpc RegisterWorker (RegisterWorkerRequest) returns (RegisterWorkerResponse);
    // Worker heartbeat
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
    // Worker reports updates about tasks previously scheduled by the server
    rpc TaskUpdate (TaskUpdateRequest) returns (TaskUpdateResponse);
    
}

message RegisterWorkerRequest {
    string name = 1;
    string host = 2;
    uint32 port = 3;
    string warehouse_type = 4;
}

message RegisterWorkerResponse {
    string status = 1;
    string uuid = 2;   
}


message HeartbeatRequest {
    string uuid = 1;
}

message HeartbeatResponse {
    string status = 1;
}

message TaskUpdateRequest {
    string task_id = 1;
    string status = 2; // e.g., running, succeeded, failed
    string result_location = 3;
    string error = 4;
    optional string stage_id = 5;
    optional uint32 partition_count = 6;
    optional uint32 partition_completed = 7;
    map<string, string> metadata = 8;
}

message TaskUpdateResponse {
    string status = 1;
}
