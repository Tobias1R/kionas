x-remote-infra-hosts: &remote_infra_hosts
  - "kionas-broker:192.168.0.15"
  - "kionas-redis:192.168.0.15"
  - "kionas-minio:192.168.0.15"
  - "kionas-consul:192.168.0.15"
  - "kionas-postgres:192.168.0.15"

services:

  builder:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.dev
    container_name: kionas-builder
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379      
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    volumes:
      - ..:/workspace:cached
    command: ["bash", "-c", "cargo build" ]
  
  devcontainer:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile.dev
    container_name: kionas-dev
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379      
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    volumes:
      - ..:/workspace:cached
    tty: true
    stdin_open: true
   
  # Metastore container
  metastore:
    image: docker-devcontainer
    hostname: kionas-metastore
    container_name: kionas-metastore
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    ports:
      - 50051:50051
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379     
    volumes:
      - ..:/workspace:cached     
    depends_on:
      - builder
    # inifinite loop to keep the container running, replace with actual command when ready
    command: ["bash", "-c", "/workspace/target/debug/metastore" ]

  # warehouse container
  warehouse:
    image: docker-devcontainer
    hostname: kionas-warehouse
    container_name: kionas-warehouse
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    ports:
      - 8080:8080
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379
    volumes:
      - ..:/workspace:cached
    depends_on:
      - builder
      - metastore      
    command: ["bash", "-c", "/workspace/target/debug/server" ]

  # flight proxy container
  flight-proxy:
    image: docker-devcontainer
    hostname: kionas-flight-proxy
    container_name: kionas-flight-proxy
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      FLIGHT_PROXY_PORT: 443
      WORKER_FLIGHT_PORT: 50052
    volumes:
      - ..:/workspace:cached
    depends_on:
      - warehouse
    command: ["bash", "-c", "/workspace/target/debug/flight_proxy" ]

  # worker container
  worker1:
    image: docker-devcontainer
    hostname: kionas-worker1
    container_name: kionas-worker1
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379
      # storage endpoint and credentials for worker to access MinIO
      AWS_ACCESS_KEY_ID: root
      AWS_SECRET_ACCESS_KEY: rootpassword # You can change this, but remember to update the MinIO container's MINIO_ROOT_PASSWORD accordingly!
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://kionas-minio:9000
      FLIGHT_PROXY_HOST: kionas-flight-proxy
      FLIGHT_PROXY_PORT: 443
    volumes:
      - ..:/workspace:cached
    depends_on:
      - warehouse
    command: ["bash", "-c", "/workspace/target/debug/worker worker1" ]

  worker2:
    image: docker-devcontainer
    hostname: kionas-worker2
    container_name: kionas-worker2
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379
      # storage endpoint and credentials for worker to access MinIO
      AWS_ACCESS_KEY_ID: root
      AWS_SECRET_ACCESS_KEY: rootpassword # You can change this, but remember to update the MinIO container's MINIO_ROOT_PASSWORD accordingly!
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://kionas-minio:9000
      FLIGHT_PROXY_HOST: kionas-flight-proxy
      FLIGHT_PROXY_PORT: 443
    volumes:
      - ..:/workspace:cached
    depends_on:
      - warehouse
    command: ["bash", "-c", "/workspace/target/debug/worker worker2" ]
  # UI backend container
  ui-backend:
    image: docker-devcontainer
    hostname: kionas-ui-backend
    container_name: kionas-ui-backend
    networks:
      - warehouse_network
    extra_hosts: *remote_infra_hosts
    ports:
      - 8081:8081
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      REDIS_URL: redis://kionas-redis:6379
      UI_BACKEND_BIND: 0.0.0.0
      UI_BACKEND_PORT: 8081
    volumes:
      - ..:/workspace:cached
    depends_on:
      - warehouse
    command: ["bash", "-c", "/workspace/target/debug/ui_backend" ]
    

  

networks:
  warehouse_network:
    external: true

volumes:
  minio_data:
  minio_config: