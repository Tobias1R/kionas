      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://kionas-minio:9000
      FLIGHT_PROXY_HOST: kionas-flight-proxy
      FLIGHT_PROXY_PORT: 443
      WORKER_POOL_NAME: compute_xl
      WORKER_FLIGHT_MAX_MESSAGE_BYTES: 33554432 # 32MB, adjust as needed
      KIONAS_WORKER_METRICS_PORT: 9102
    volumes:
      - ..:/workspace:cached
    depends_on:
      warehouse:
        condition: service_started
    command: ["bash", "-c", "/workspace/scripts/run_worker2.sh" ]

  worker3:
    image: docker-builder
    hostname: kionas-worker3
    container_name: kionas-worker3
    networks:
      - warehouse_network
    ports:
      - 9103:9103
    extra_hosts: *remote_infra_hosts
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379
      # storage endpoint and credentials for worker to access MinIO
      AWS_ACCESS_KEY_ID: root
      AWS_SECRET_ACCESS_KEY: rootpassword # You can change this, but remember to update the MinIO container's MINIO_ROOT_PASSWORD accordingly!
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://kionas-minio:9000
      FLIGHT_PROXY_HOST: kionas-flight-proxy
      FLIGHT_PROXY_PORT: 443
      WORKER_POOL_NAME: compute_xl
      WORKER_FLIGHT_MAX_MESSAGE_BYTES: 33554432 # 32MB, adjust as needed
      KIONAS_WORKER_METRICS_PORT: 9103

    volumes:
      - ..:/workspace:cached
    depends_on:
      warehouse:
        condition: service_started
    command: ["bash", "-c", "/workspace/scripts/run_worker3.sh" ]

  worker4:
    image: docker-builder
    hostname: kionas-worker4
    container_name: kionas-worker4
    networks:
      - warehouse_network
    ports:
      - 9104:9104
    extra_hosts: *remote_infra_hosts
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: full
      KIONAS_HOME: /workspace
      CARGO_TARGET_DIR: /workspace/docker-target
      CONSUL_URL: http://kionas-consul:8500
      REDIS_URL: redis://kionas-redis:6379
      # storage endpoint and credentials for worker to access MinIO
      AWS_ACCESS_KEY_ID: root
      AWS_SECRET_ACCESS_KEY: rootpassword # You can change this, but remember to update the MinIO container's MINIO_ROOT_PASSWORD accordingly!
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://kionas-minio:9000
      FLIGHT_PROXY_HOST: kionas-flight-proxy
      FLIGHT_PROXY_PORT: 443
      WORKER_POOL_NAME: compute_xl
      WORKER_FLIGHT_MAX_MESSAGE_BYTES: 33554432 # 32MB, adjust as needed
      KIONAS_WORKER_METRICS_PORT: 9104
    volumes:
